workflows:
  android-workflow:
    name: Android Build

    environment:
      vars:
        PROJECT_PATH: ThambiApp

    scripts:
      - name: Go to project folder
        script: cd $PROJECT_PATH

      - name: Give permission
        script: chmod +x gradlew

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - ThambiApp/app/build/outputs/**/*.apk
