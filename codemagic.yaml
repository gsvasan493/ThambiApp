workflows:
  android-workflow:
    name: Android Build

    scripts:
      - name: Go inside folder
        script: cd ThambiApp

      - name: Give permission
        script: chmod +x gradlew

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - ThambiApp/app/build/outputs/**/*.apkworkflows:
