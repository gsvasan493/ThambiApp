workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.thambi.assistant"
    scripts:
      - name: Install Gradle
        script: |
          brew install gradle

      - name: Build APK
        script: |
          gradle build
    artifacts:
      - app/build/outputs/**/*.apk
